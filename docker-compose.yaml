services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER_FILE: /run/secrets/db_user
      POSTGRES_PASSWORD_FILE: /run/secrets/db_password
      POSTGRES_DB: snies
    secrets:
      - db_user
      - db_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql

  loader:
    build:
      context: ./scripts
      dockerfile: Dockerfile
    depends_on:
      - postgres
    environment:
      DB_USER_FILE: /run/secrets/db_user
      DB_PASSWORD_FILE: /run/secrets/db_password
    secrets:
      - db_user
      - db_password
    volumes:
      - ./scripts:/scripts
      - ./files:/files
      - ./data:/data
    # command: python /scripts/ingest_data.py # This is handled as CMD in Dockerfile

  orchestrator:
    build:
      context: ./orchestration
      dockerfile: Dockerfile
    environment:
      DB_USER_FILE: /run/secrets/db_user
      DB_PASSWORD_FILE: /run/secrets/db_password
      PREFECT_API_URL: http://127.0.0.1:4200/api
    secrets:
      - db_user
      - db_password
    entrypoint: /orchestration/entrypoint.sh
    command: prefect server start --host 0.0.0.0
    ports:
      - "4200:4200"
      - "8080:8080"
    volumes:
      - ./dbt_project:/dbt_project
      - ./files:/files
      - ./raw_snies_files:/raw_snies_files
      - ./scripts:/scripts
      - ./orchestration:/orchestration
    depends_on:
      - postgres

  grafana:
    image: grafana/grafana-oss:latest
    container_name: grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_BASIC_ENABLED=false
    entrypoint: /init-grafana.sh
    secrets:
      - db_user
      - db_password
    ports:
      - "3000:3000"
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      - ./grafana/init-grafana.sh:/init-grafana.sh
    depends_on:
      - postgres

volumes:
  postgres_data:


secrets:
  db_user:
    file: ./secrets/db_user
  db_password:
    file: ./secrets/db_password
